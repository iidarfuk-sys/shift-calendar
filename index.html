<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>シフト希望カレンダー</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0ede6;
  --card: #faf8f4;
  --green: #2c5f3f;
  --green2: #3d7a55;
  --green-pale: #ddeee3;
  --amber: #d4820a;
  --amber-pale: #fdf0d8;
  --red: #c0392b;
  --red-pale: #fdecea;
  --text: #1e2d24;
  --muted: #7a8f80;
  --border: #ddd8ce;
  --r: 14px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Noto Sans JP',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

.screen { display:none; }
.screen.active { display:block; }

#screen-name.active {
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  min-height:100vh; padding:32px 20px;
}
.logo { font-size:11px; letter-spacing:.3em; color:var(--muted); text-transform:uppercase; margin-bottom:8px; }
.screen-title { font-size:26px; font-weight:700; color:var(--green); margin-bottom:6px; text-align:center; }
.screen-sub { font-size:13px; color:var(--muted); margin-bottom:36px; text-align:center; }
.name-list { display:flex; flex-direction:column; gap:10px; width:100%; max-width:340px; }
.name-card {
  background:var(--card); border:2px solid var(--border); border-radius:var(--r);
  padding:16px 20px; font-size:16px; font-weight:500; cursor:pointer;
  display:flex; align-items:center; gap:12px; width:100%;
  font-family:'Noto Sans JP',sans-serif; color:var(--text);
}
.name-card:active { background:var(--green-pale); border-color:var(--green2); }
.name-avatar {
  width:38px; height:38px; background:var(--green-pale); border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:16px; font-weight:700; color:var(--green); flex-shrink:0;
}


#screen-calendar.active { display:block; padding-bottom:100px; }
.cal-header { background:var(--green); color:#fff; padding:18px 16px 14px; position:sticky; top:0; z-index:10; }
.cal-header-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.back-btn {
  background:rgba(255,255,255,.2); border:none; color:#fff;
  width:36px; height:36px; border-radius:8px; font-size:18px; cursor:pointer;
}
.cal-title { text-align:center; flex:1; }
.cal-who { font-size:12px; opacity:.75; }
.cal-month-txt { font-size:22px; font-weight:700; }
.month-nav { display:flex; gap:6px; }
.month-btn { background:rgba(255,255,255,.2); border:none; color:#fff; width:36px; height:36px; border-radius:8px; font-size:20px; cursor:pointer; }
.legend { display:flex; gap:12px; justify-content:center; font-size:12px; opacity:.9; flex-wrap:wrap; }

.dow-row { display:grid; grid-template-columns:repeat(7,1fr); background:#fff; border-bottom:1px solid var(--border); }
.dow-cell { text-align:center; padding:8px 0; font-size:12px; font-weight:700; color:var(--muted); }
.dow-sun { color:var(--red); }
.dow-sat { color:#1a5276; }

.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:1px; background:var(--border); }
.day-cell { background:var(--card); min-height:68px; padding:5px 3px 3px; display:flex; flex-direction:column; align-items:center; gap:2px; cursor:pointer; user-select:none; }
.day-cell.empty { background:var(--bg); cursor:default; }
.day-num { font-size:13px; font-weight:600; width:22px; height:22px; display:flex; align-items:center; justify-content:center; }
.col-sun .day-num { color:var(--red); }
.col-sat .day-num { color:#1a5276; }
.day-today .day-num { background:var(--amber); color:#fff; border-radius:50%; }
.status-badge { width:34px; height:28px; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:700; }
.s-ok    { background:var(--green-pale); color:var(--green); }
.s-maybe { background:var(--amber-pale); color:var(--amber); }
.s-ng    { background:var(--red-pale);   color:var(--red); }
.s-none  { border:1.5px dashed #ccc; }
.time-badge { font-size:9px; color:var(--muted); text-align:center; line-height:1.3; white-space:pre; }

.note-card { margin:12px 14px 0; background:var(--card); border-radius:var(--r); padding:14px; border:1px solid var(--border); }
.note-lbl { font-size:11px; font-weight:700; letter-spacing:.1em; color:var(--muted); margin-bottom:8px; }
.note-card textarea { width:100%; padding:10px; border:1.5px solid var(--border); border-radius:8px; font-size:13px; background:var(--bg); color:var(--text); font-family:'Noto Sans JP',sans-serif; resize:none; height:68px; outline:none; }
.submit-area { padding:14px; position:sticky; bottom:0; background:var(--bg); border-top:1px solid var(--border); }
.submit-btn { display:block; width:100%; padding:16px; background:linear-gradient(135deg,var(--green),var(--green2)); color:#fff; border:none; border-radius:10px; font-family:'Noto Sans JP',sans-serif; font-size:15px; font-weight:700; cursor:pointer; }

.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:100; align-items:flex-end; justify-content:center; }
.modal-overlay.open { display:flex; }
.modal { background:var(--card); border-radius:16px 16px 0 0; padding:22px 18px 36px; width:100%; max-width:480px; }
.modal-date { font-size:18px; font-weight:700; color:var(--green); margin-bottom:16px; text-align:center; }
.st-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.st-btn { padding:14px 8px; border:2px solid var(--border); border-radius:10px; font-family:'Noto Sans JP',sans-serif; font-size:13px; font-weight:700; cursor:pointer; text-align:center; line-height:1.6; }
.st-ok    { border-color:var(--green2); background:var(--green-pale); color:var(--green); }
.st-maybe { border-color:var(--amber);  background:var(--amber-pale); color:var(--amber); }
.st-ng    { border-color:var(--red);    background:var(--red-pale);   color:var(--red); }
.st-clear { background:var(--bg); color:var(--muted); }

.time-lbl { font-size:12px; color:var(--muted); font-weight:500; margin-bottom:8px; }
.preset-row { display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap; }
.preset-btn { padding:8px 14px; border:1.5px solid var(--border); border-radius:20px; font-size:12px; background:var(--bg); color:var(--text); cursor:pointer; font-family:'Noto Sans JP',sans-serif; }
.preset-btn.active { background:var(--green); border-color:var(--green); color:#fff; }
.time-row { display:flex; align-items:center; gap:8px; margin-bottom:14px; }
.time-row input[type=time] { flex:1; padding:10px; border:1.5px solid var(--border); border-radius:8px; font-size:14px; background:var(--bg); color:var(--text); outline:none; font-family:'Noto Sans JP',sans-serif; }
.modal-ok-btn { display:block; width:100%; padding:14px; background:var(--green); color:#fff; border:none; border-radius:10px; font-family:'Noto Sans JP',sans-serif; font-size:15px; font-weight:700; cursor:pointer; margin-bottom:8px; }
.modal-clr-btn { display:block; width:100%; padding:12px; background:var(--bg); color:var(--muted); border:1.5px solid var(--border); border-radius:10px; font-family:'Noto Sans JP',sans-serif; font-size:14px; cursor:pointer; }

#screen-done.active { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:40px 24px; text-align:center; }
.done-icon { font-size:52px; margin-bottom:14px; }
.done-title { font-size:22px; font-weight:700; color:var(--green); margin-bottom:20px; }
.done-count { display:flex; gap:20px; background:var(--card); border:1px solid var(--border); border-radius:var(--r); padding:16px 24px; margin-bottom:20px; }
.count-item { text-align:center; }
.count-num { font-size:30px; font-weight:700; line-height:1; }
.count-lbl { font-size:11px; color:var(--muted); margin-top:4px; }
.c-ok .count-num { color:var(--green); }
.c-maybe .count-num { color:var(--amber); }
.c-ng .count-num { color:var(--red); }
.done-summary { font-size:13px; color:var(--muted); line-height:1.9; margin-bottom:24px; white-space:pre-wrap; }
.reset-btn { padding:14px 32px; background:var(--green-pale); border:none; border-radius:10px; font-family:'Noto Sans JP',sans-serif; font-size:14px; color:var(--green); font-weight:700; cursor:pointer; }
</style>
</head>
<body>

<div id="screen-name" class="screen active">
  <div class="logo">SHIFT REQUEST</div>
  <div class="screen-title">シフト希望入力</div>
  <div class="screen-sub">名前を選んでください</div>
  <div class="name-list" id="name-list"></div>
</div>

<div id="screen-calendar" class="screen">
  <div class="cal-header">
    <div class="cal-header-top">
      <button class="back-btn" onclick="goBack()">←</button>
      <div class="cal-title">
        <div class="cal-who" id="cal-who"></div>
        <div class="cal-month-txt" id="cal-month"></div>
      </div>
      <div class="month-nav">
        <button class="month-btn" onclick="changeMonth(-1)">‹</button>
        <button class="month-btn" onclick="changeMonth(1)">›</button>
      </div>
    </div>
    <div class="legend">
      <span>○ 出勤可</span>
      <span>△ 応相談</span>
      <span>× 出勤不可</span>
    </div>
  </div>
  <div class="dow-row">
    <div class="dow-cell dow-sun">日</div>
    <div class="dow-cell">月</div><div class="dow-cell">火</div>
    <div class="dow-cell">水</div><div class="dow-cell">木</div>
    <div class="dow-cell">金</div>
    <div class="dow-cell dow-sat">土</div>
  </div>
  <div class="cal-grid" id="cal-grid"></div>
  <div class="note-card">
    <div class="note-lbl">備考・コメント</div>
    <textarea id="global-note" placeholder="特記事項があれば入力してください"></textarea>
  </div>
  <div class="submit-area">
    <button class="submit-btn" onclick="handleSubmit()">✓ 希望を送信する</button>
  </div>
</div>

<div class="modal-overlay" id="modal-status" onclick="closeStOutside(event)">
  <div class="modal">
    <div class="modal-date" id="st-label"></div>
    <div class="st-grid">
      <button class="st-btn st-ok"    onclick="setStatus('ok')">○<br>出勤可</button>
      <button class="st-btn st-maybe" onclick="setStatus('maybe')">△<br>応相談</button>
      <button class="st-btn st-ng"    onclick="setStatus('ng')">×<br>出勤不可</button>
      <button class="st-btn st-clear" onclick="setStatus('none')">　<br>空白に戻す</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-time" onclick="closeTmOutside(event)">
  <div class="modal">
    <div class="modal-date" id="tm-label"></div>
    <div class="time-lbl">時間帯（任意）</div>
    <div class="preset-row">
      <button class="preset-btn" onclick="setPreset(this,'07:00','12:00')">午前中 7-12時</button>
      <button class="preset-btn" onclick="setPreset(this,'07:00','17:00')">終日 7-17時</button>
    </div>
    <div class="time-row">
      <input type="time" id="t-start">
      <span>〜</span>
      <input type="time" id="t-end">
    </div>
    <button class="modal-ok-btn"  onclick="closeTimeModal()">確定</button>
    <button class="modal-clr-btn" onclick="clearFromTime()">空白に戻す</button>
  </div>
</div>

<div id="screen-done" class="screen">
  <div class="done-icon">🌱</div>
  <div class="done-title">送信完了しました</div>
  <div class="done-count">
    <div class="count-item c-ok"><div class="count-num" id="cnt-ok">0</div><div class="count-lbl">○ 出勤可</div></div>
    <div class="count-item c-maybe"><div class="count-num" id="cnt-maybe">0</div><div class="count-lbl">△ 応相談</div></div>
    <div class="count-item c-ng"><div class="count-num" id="cnt-ng">0</div><div class="count-lbl">× 出勤不可</div></div>
  </div>
  <div class="done-summary" id="done-summary"></div>
  <button class="reset-btn" onclick="resetAll()">最初に戻る</button>
</div>

<script>
var STAFF   = ['野口','吉田','磯村','音光寺','原'];
var GAS_URL = 'https://script.google.com/macros/s/AKfycbzl1qFI1sruGRg1kUm-ZuM4InTZobs8Xo6AkmZO0EP8jzPw0tfNbFtFvL205dJNCWYi-w/exec';
var DOWS    = ['日','月','火','水','木','金','土'];
var currentName='', currentYear=0, currentMonth=0, dayData={}, editingDate='';

function lsSave(){try{localStorage.setItem('sh_'+currentName+'_'+currentYear+'_'+currentMonth,JSON.stringify(dayData));}catch(e){}}
function lsLoad(n,y,m){try{var v=localStorage.getItem('sh_'+n+'_'+y+'_'+m);return v?JSON.parse(v):{};}catch(e){return {};}}


function showScreen(id){
  ['screen-name','screen-calendar','screen-done'].forEach(function(s){
    document.getElementById(s).classList.remove('active');
  });
  document.getElementById(id).classList.add('active');
}

function buildNameList(){
  var list=document.getElementById('name-list');
  list.innerHTML='';
  STAFF.forEach(function(name){
    var btn=document.createElement('button');
    btn.className='name-card';
    var av=document.createElement('div'); av.className='name-avatar'; av.textContent=name[0];
    var nm=document.createElement('span'); nm.textContent=name;
    btn.appendChild(av); btn.appendChild(nm);

    btn.onclick=function(){startCalendar(name);};
    list.appendChild(btn);
  });
}

function startCalendar(name){
  currentName=name;
  var now=new Date();
  if(now.getMonth()===11){currentYear=now.getFullYear()+1;currentMonth=1;}
  else{currentYear=now.getFullYear();currentMonth=now.getMonth()+2;}
  dayData=lsLoad(name,currentYear,currentMonth);
  document.getElementById('cal-who').textContent=name+' さん';
  renderCalendar();
  showScreen('screen-calendar');
}

function goBack(){showScreen('screen-name');}

function changeMonth(d){
  currentMonth+=d;
  if(currentMonth>12){currentMonth=1;currentYear++;}
  if(currentMonth<1){currentMonth=12;currentYear--;}
  dayData=lsLoad(currentName,currentYear,currentMonth);
  renderCalendar();
}

function pad(n){return String(n).padStart(2,'0');}

function renderCalendar(){
  document.getElementById('cal-month').textContent=currentYear+'年'+currentMonth+'月';
  var grid=document.getElementById('cal-grid');
  grid.innerHTML='';
  var firstDay=new Date(currentYear,currentMonth-1,1).getDay();
  var lastDate=new Date(currentYear,currentMonth,0).getDate();
  var today=new Date();
  for(var i=0;i<firstDay;i++){var e=document.createElement('div');e.className='day-cell empty';grid.appendChild(e);}
  for(var d=1;d<=lastDate;d++){
    var ds=currentYear+'-'+pad(currentMonth)+'-'+pad(d);
    var dow=(firstDay+d-1)%7;
    var isToday=today.getFullYear()===currentYear&&today.getMonth()===currentMonth-1&&today.getDate()===d;
    var cell=document.createElement('div');
    var cls='day-cell';
    if(dow===0)cls+=' col-sun';
    if(dow===6)cls+=' col-sat';
    if(isToday)cls+=' day-today';
    cell.className=cls;
    (function(date){cell.onclick=function(){openModal(date);};})(ds);
    var num=document.createElement('div');num.className='day-num';num.textContent=d;cell.appendChild(num);
    var data=dayData[ds];
    var badge=document.createElement('div');badge.className='status-badge';
    if(data&&data.status&&data.status!=='none'){
      var map={ok:['s-ok','○'],maybe:['s-maybe','△'],ng:['s-ng','×']};
      var info=map[data.status];
      badge.classList.add(info[0]);badge.textContent=info[1];cell.appendChild(badge);
      if(data.start&&data.end&&data.status!=='ng'){var tb=document.createElement('div');tb.className='time-badge';tb.textContent=data.start+'\n'+data.end;cell.appendChild(tb);}
    }else{badge.classList.add('s-none');cell.appendChild(badge);}
    grid.appendChild(cell);
  }
}

function openModal(date){
  editingDate=date;
  var p=date.split('-');
  var dow=DOWS[new Date(+p[0],+p[1]-1,+p[2]).getDay()];
  var label=+p[1]+'月'+p[2]+'日（'+dow+'）';
  var data=dayData[date];
  if(data&&data.status&&data.status!=='none'){
    document.getElementById('tm-label').textContent=label;
    document.getElementById('t-start').value=data.start||'';
    document.getElementById('t-end').value=data.end||'';
    clearPresets();
    document.getElementById('modal-time').classList.add('open');
  }else{
    document.getElementById('st-label').textContent=label;
    document.getElementById('modal-status').classList.add('open');
  }
}

function closeStOutside(e){if(e.target.id==='modal-status')document.getElementById('modal-status').classList.remove('open');}
function closeTmOutside(e){if(e.target.id==='modal-time')closeTimeModal();}

function setStatus(status){
  if(status==='none'){delete dayData[editingDate];}
  else{var prev=dayData[editingDate]||{};dayData[editingDate]={status:status,start:prev.start||'',end:prev.end||''};}
  lsSave();document.getElementById('modal-status').classList.remove('open');renderCalendar();
}

function closeTimeModal(){
  var data=dayData[editingDate];
  if(data){data.start=document.getElementById('t-start').value;data.end=document.getElementById('t-end').value;}
  lsSave();document.getElementById('modal-time').classList.remove('open');renderCalendar();
}

function clearFromTime(){
  delete dayData[editingDate];lsSave();
  document.getElementById('modal-time').classList.remove('open');renderCalendar();
}

function setPreset(btn,s,e){
  clearPresets();btn.classList.add('active');
  document.getElementById('t-start').value=s;document.getElementById('t-end').value=e;
}
function clearPresets(){document.querySelectorAll('.preset-btn').forEach(function(b){b.classList.remove('active');});}

function handleSubmit(){
  var okN=0,maybeN=0,ngN=0,days=[];
  // その月の全日付を生成して送信
  var lastDate=new Date(currentYear,currentMonth,0).getDate();
  for(var d=1;d<=lastDate;d++){
    var ds=currentYear+'-'+pad(currentMonth)+'-'+pad(d);
    var v=dayData[ds];
    var status=v?v.status:'none';
    var start=v?v.start||'':'';
    var end=v?v.end||'':'';
    if(status==='ok')okN++;
    if(status==='maybe')maybeN++;
    if(status==='ng')ngN++;
    days.push({date:ds,status:status,start:start,end:end});
  }
  var note=document.getElementById('global-note').value;
  var ym=currentYear+'-'+pad(currentMonth);
  document.getElementById('cnt-ok').textContent=okN;
  document.getElementById('cnt-maybe').textContent=maybeN;
  document.getElementById('cnt-ng').textContent=ngN;
  document.getElementById('done-summary').textContent=currentName+' さん / '+currentYear+'年'+currentMonth+'月'+(note?'\n備考：'+note:'');
  lsSave();
  fetch(GAS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:currentName,yearMonth:ym,note:note,days:days})}).catch(function(e){});
  showScreen('screen-done');window.scrollTo(0,0);
}

function resetAll(){
  dayData={};document.getElementById('global-note').value='';
  buildNameList();showScreen('screen-name');window.scrollTo(0,0);
}

buildNameList();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>シフト管理ビューア</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0ede6; --card: #faf8f4;
  --green: #2c5f3f; --green2: #3d7a55; --green-pale: #ddeee3;
  --amber: #d4820a; --amber-pale: #fdf0d8;
  --red: #c0392b; --red-pale: #fdecea;
  --text: #1e2d24; --muted: #7a8f80; --border: #ddd8ce; --r: 12px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Noto Sans JP',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

/* ヘッダー */
.header { background:var(--green); color:#fff; padding:14px 16px; position:sticky; top:0; z-index:20; }
.header-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.header-title { font-size:15px; font-weight:700; }
.hdr-btns { display:flex; gap:6px; }
.reload-btn { background:rgba(255,255,255,.2); border:none; color:#fff; padding:6px 10px; border-radius:8px; font-size:12px; font-family:'Noto Sans JP',sans-serif; cursor:pointer; }
.save-btn   { background:var(--amber); border:none; color:#fff; padding:6px 12px; border-radius:8px; font-size:12px; font-family:'Noto Sans JP',sans-serif; cursor:pointer; font-weight:700; display:none; }
.month-nav  { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.month-btn  { background:rgba(255,255,255,.2); border:none; color:#fff; width:34px; height:34px; border-radius:8px; font-size:18px; cursor:pointer; }
.month-label { font-size:18px; font-weight:700; min-width:110px; text-align:center; }
.mode-bar   { display:flex; background:rgba(255,255,255,.15); border-radius:8px; overflow:hidden; }
.mode-btn   { flex:1; padding:7px; border:none; background:transparent; color:rgba(255,255,255,.7); font-size:12px; font-family:'Noto Sans JP',sans-serif; font-weight:500; cursor:pointer; }
.mode-btn.active { background:rgba(255,255,255,.3); color:#fff; font-weight:700; }

/* ローディング・エラー */
.loading { text-align:center; padding:60px 20px; color:var(--muted); font-size:14px; }
.spinner { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--green); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 12px; }
@keyframes spin { to { transform:rotate(360deg); } }
.error-msg { text-align:center; padding:40px 20px; color:var(--red); font-size:14px; }

/* 凡例 */
.legend { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; padding:10px 0 4px; font-size:12px; color:var(--muted); }
.legend span { display:flex; align-items:center; gap:4px; }
.leg-dot { width:14px; height:14px; border-radius:3px; display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:700; }

/* スタッフタブ */
.staff-tabs { display:flex; gap:6px; flex-wrap:wrap; padding:10px 12px 0; }
.staff-tab { padding:6px 12px; border:1.5px solid var(--border); border-radius:20px; font-size:12px; font-weight:500; background:var(--card); color:var(--muted); cursor:pointer; font-family:'Noto Sans JP',sans-serif; }
.staff-tab.active { background:var(--green); border-color:var(--green); color:#fff; }

/* カレンダー */
.cal-wrap { background:var(--card); border-radius:var(--r); overflow:hidden; border:1px solid var(--border); margin:10px 12px 0; }
.dow-row  { display:grid; grid-template-columns:repeat(7,1fr); background:var(--green); }
.dow-cell { text-align:center; padding:7px 0; font-size:11px; font-weight:700; color:rgba(255,255,255,.85); }
.dow-sun  { color:#ffb3b3; } .dow-sat { color:#b3d4ff; }
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:1px; background:var(--border); }
.day-cell { background:var(--card); min-height:62px; padding:4px 2px 3px; display:flex; flex-direction:column; align-items:center; gap:1px; }
.day-cell.empty { background:var(--bg); }
.day-num  { font-size:12px; font-weight:600; width:20px; height:20px; display:flex; align-items:center; justify-content:center; }
.col-sun .day-num { color:var(--red); } .col-sat .day-num { color:#1a5276; }
.day-today .day-num { background:var(--amber); color:#fff; border-radius:50%; }

/* 希望表示（全員） */
.staff-badges { display:flex; flex-direction:column; gap:1px; width:100%; }
.staff-row    { display:flex; align-items:center; gap:2px; padding:0 2px; }
.staff-name-mini { font-size:7px; color:var(--muted); width:18px; flex-shrink:0; overflow:hidden; white-space:nowrap; }
.badge-mini   { font-size:10px; font-weight:700; width:16px; text-align:center; }
.b-ok { color:var(--green); } .b-maybe { color:var(--amber); } .b-ng { color:var(--red); } .b-none { color:#ddd; }

/* 希望表示（個人） */
.badge-lg { width:32px; height:26px; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:15px; font-weight:700; }
.bl-ok { background:var(--green-pale); color:var(--green); } .bl-maybe { background:var(--amber-pale); color:var(--amber); } .bl-ng { background:var(--red-pale); color:var(--red); } .bl-none { display:none; }

/* 確定シフト入力モード */
.confirmed-badge { width:34px; height:28px; border-radius:6px; display:flex; flex-direction:column; align-items:center; justify-content:center; font-size:10px; font-weight:700; }
.cb-set   { background:var(--green); color:#fff; cursor:pointer; }
.cb-empty { border:2px dashed var(--green2); color:var(--green2); cursor:pointer; font-size:16px; }
.cb-time  { font-size:7px; font-weight:400; opacity:.85; }

/* 確定済みスタッフ表示（全員モード） */
.conf-staff-badges { display:flex; flex-direction:column; gap:1px; width:100%; margin-top:2px; }
.conf-staff-row    { display:flex; align-items:center; gap:2px; padding:0 2px; }
.conf-dot { width:8px; height:8px; background:var(--green); border-radius:50%; flex-shrink:0; }
.conf-name { font-size:7px; color:var(--green); font-weight:700; }

/* サマリー・備考 */
.summary-area { margin:12px 12px 0; background:var(--card); border-radius:var(--r); padding:14px; border:1px solid var(--border); }
.summary-title { font-size:11px; font-weight:700; letter-spacing:.1em; color:var(--muted); margin-bottom:10px; }
.summary-grid  { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
.summary-card  { background:var(--bg); border-radius:8px; padding:10px; text-align:center; }
.summary-num   { font-size:22px; font-weight:700; line-height:1; }
.summary-lbl   { font-size:10px; color:var(--muted); margin-top:3px; }
.s-ok .summary-num { color:var(--green); } .s-maybe .summary-num { color:var(--amber); } .s-ng .summary-num { color:var(--red); }
.notes-area    { margin:10px 12px 0; background:var(--card); border-radius:var(--r); padding:14px; border:1px solid var(--border); }
.notes-title   { font-size:11px; font-weight:700; letter-spacing:.1em; color:var(--muted); margin-bottom:8px; }
.note-row      { font-size:13px; color:var(--text); padding:6px 0; border-bottom:1px solid var(--border); line-height:1.6; }
.note-row:last-child { border-bottom:none; }
.note-name     { font-weight:700; color:var(--green); margin-right:8px; }
.pb80 { padding-bottom:80px; }

/* モーダル */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:100; align-items:flex-end; justify-content:center; }
.modal-overlay.open { display:flex; }
.modal { background:var(--card); border-radius:16px 16px 0 0; padding:22px 18px 36px; width:100%; max-width:480px; }
.modal-date { font-size:18px; font-weight:700; color:var(--green); margin-bottom:4px; text-align:center; }
.modal-sub  { font-size:12px; color:var(--muted); text-align:center; margin-bottom:16px; }
.modal-section-lbl { font-size:11px; font-weight:700; letter-spacing:.1em; color:var(--muted); margin-bottom:8px; }

/* スタッフチェック */
.staff-check-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:16px; }
.staff-check-btn  { padding:10px 4px; border:2px solid var(--border); border-radius:8px; font-family:'Noto Sans JP',sans-serif; font-size:13px; font-weight:500; cursor:pointer; text-align:center; background:var(--bg); color:var(--muted); }
.staff-check-btn.selected { border-color:var(--green); background:var(--green-pale); color:var(--green); font-weight:700; }
.staff-hint { font-size:10px; color:var(--muted); margin-top:2px; } /* 希望ステータス表示用 */

/* 時間入力 */
.time-presets { display:flex; gap:8px; margin-bottom:10px; flex-wrap:wrap; }
.preset-btn { padding:8px 14px; border:1.5px solid var(--border); border-radius:20px; font-size:12px; background:var(--bg); color:var(--text); cursor:pointer; font-family:'Noto Sans JP',sans-serif; }
.preset-btn.active { background:var(--green); border-color:var(--green); color:#fff; }
.time-row { display:flex; align-items:center; gap:8px; margin-bottom:14px; }
.time-row input[type=time] { flex:1; padding:10px; border:1.5px solid var(--border); border-radius:8px; font-size:14px; background:var(--bg); color:var(--text); outline:none; font-family:'Noto Sans JP',sans-serif; }
.modal-ok-btn  { display:block; width:100%; padding:14px; background:var(--green); color:#fff; border:none; border-radius:10px; font-family:'Noto Sans JP',sans-serif; font-size:15px; font-weight:700; cursor:pointer; margin-bottom:8px; }
.modal-clr-btn { display:block; width:100%; padding:12px; background:var(--bg); color:var(--muted); border:1.5px solid var(--border); border-radius:10px; font-family:'Noto Sans JP',sans-serif; font-size:14px; cursor:pointer; }

/* 保存ボタン（固定） */
.save-fixed { position:fixed; bottom:0; left:0; right:0; padding:14px; background:var(--bg); border-top:1px solid var(--border); display:none; z-index:15; }
.save-fixed-btn { display:block; width:100%; padding:16px; background:var(--amber); color:#fff; border:none; border-radius:10px; font-family:'Noto Sans JP',sans-serif; font-size:15px; font-weight:700; cursor:pointer; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="header-title">📋 シフト管理ビューア</div>
    <div class="hdr-btns">
      <button class="reload-btn" onclick="loadData()">再読込</button>
    </div>
  </div>
  <div class="month-nav">
    <button class="month-btn" onclick="changeMonth(-1)">‹</button>
    <div class="month-label" id="month-label"></div>
    <button class="month-btn" onclick="changeMonth(1)">›</button>
  </div>
  <div class="mode-bar">
    <button class="mode-btn active" id="btn-kibou-all"    onclick="setMode('kibou-all')">希望・全員</button>
    <button class="mode-btn"        id="btn-kibou-single" onclick="setMode('kibou-single')">希望・個人</button>
    <button class="mode-btn"        id="btn-kakutei"      onclick="setMode('kakutei')">確定入力</button>
  </div>
</div>

<div id="loading" class="loading"><div class="spinner"></div>読み込み中...</div>
<div id="error"   class="error-msg" style="display:none"></div>
<div id="main-view" style="display:none" class="pb80"></div>

<!-- 確定シフト入力モーダル -->
<div class="modal-overlay" id="modal-kakutei" onclick="closeKakuteiOutside(event)">
  <div class="modal">
    <div class="modal-date" id="kk-date-label"></div>
    <div class="modal-sub">出勤するスタッフを選んでください</div>
    <div class="modal-section-lbl">スタッフ</div>
    <div class="staff-check-grid" id="kk-staff-grid"></div>
    <div class="modal-section-lbl">時間帯（全員共通）</div>
    <div class="time-presets">
      <button class="preset-btn" onclick="setKkPreset(this,'07:00','12:00')">午前中 7-12時</button>
      <button class="preset-btn" onclick="setKkPreset(this,'07:00','17:00')">終日 7-17時</button>
    </div>
    <div class="time-row">
      <input type="time" id="kk-start"><span>〜</span><input type="time" id="kk-end">
    </div>
    <button class="modal-ok-btn"  onclick="saveKakuteiDay()">確定</button>
    <button class="modal-clr-btn" onclick="clearKakuteiDay()">この日をクリア</button>
  </div>
</div>

<!-- 保存ボタン（固定） -->
<div class="save-fixed" id="save-fixed">
  <button class="save-fixed-btn" onclick="saveAllKakutei()">💾 確定シフトを保存する</button>
</div>

<script>
var GAS_URL       = 'https://script.google.com/macros/s/AKfycbzl1qFI1sruGRg1kUm-ZuM4InTZobs8Xo6AkmZO0EP8jzPw0tfNbFtFvL205dJNCWYi-w/exec';
var STAFF         = ['野口','吉田','磯村','音光寺','原'];
var DOWS          = ['日','月','火','水','木','金','土'];
var currentMode   = 'kibou-all';
var selectedStaff = STAFF[0];
var kibouData     = []; // シフト希望
var kakuteiData   = []; // 確定シフト（保存済み）
var kakuteiEdit   = {}; // 確定シフト（編集中）{ 'YYYY-MM-DD': { staffList:[...], start, end } }
var editingDate   = '';
var currentYear, currentMonth;
var kakuteiDirty  = false; // 未保存変更あり

(function(){
  var now=new Date();
  if(now.getMonth()===11){currentYear=now.getFullYear()+1;currentMonth=1;}
  else{currentYear=now.getFullYear();currentMonth=now.getMonth()+2;}
  updateMonthLabel();
  loadData();
})();

function pad(n){ return String(n).padStart(2,'0'); }
function updateMonthLabel(){ document.getElementById('month-label').textContent=currentYear+'年'+currentMonth+'月'; }

function changeMonth(d){
  if(kakuteiDirty && !confirm('未保存の確定シフトがあります。移動しますか？')) return;
  currentMonth+=d;
  if(currentMonth>12){currentMonth=1;currentYear++;}
  if(currentMonth<1){currentMonth=12;currentYear--;}
  updateMonthLabel();
  loadData();
}

function setMode(mode){
  currentMode=mode;
  ['kibou-all','kibou-single','kakutei'].forEach(function(m){
    document.getElementById('btn-'+m).classList.toggle('active', m===mode);
  });
  renderView();
  document.getElementById('save-fixed').style.display = mode==='kakutei'?'block':'none';
}

/* ── データ読み込み ── */
function loadData(){
  document.getElementById('loading').style.display='block';
  document.getElementById('error').style.display='none';
  document.getElementById('main-view').style.display='none';
  kakuteiDirty=false;
  kakuteiEdit={};

  var ym=currentYear+'-'+pad(currentMonth);
  var kibouDone=false, kakuteiDone=false;

  function checkDone(){
    if(!kibouDone||!kakuteiDone) return;
    // 確定シフトをeditにコピー
    kakuteiData.forEach(function(row){
      if(!kakuteiEdit[row.date]) kakuteiEdit[row.date]={staffList:[],start:row.start,end:row.end};
      if(kakuteiEdit[row.date].staffList.indexOf(row.name)<0) kakuteiEdit[row.date].staffList.push(row.name);
    });
    document.getElementById('loading').style.display='none';
    document.getElementById('main-view').style.display='block';
    renderView();
  }

  fetch(GAS_URL+'?type=kibou&yearMonth='+ym)
    .then(function(r){return r.json();})
    .then(function(d){kibouData=d.data||[];kibouDone=true;checkDone();})
    .catch(function(){kibouData=[];kibouDone=true;checkDone();});

  fetch(GAS_URL+'?type=kakutei&yearMonth='+ym)
    .then(function(r){return r.json();})
    .then(function(d){kakuteiData=d.data||[];kakuteiDone=true;checkDone();})
    .catch(function(){kakuteiData=[];kakuteiDone=true;checkDone();});
}

function showError(msg){ var el=document.getElementById('error');el.textContent=msg;el.style.display='block'; }

/* ── 希望データインデックス ── */
function buildKibouIndex(){
  var idx={};
  var ym=currentYear+'-'+pad(currentMonth);
  kibouData.forEach(function(row){
    var rowYm=String(row.yearMonth).trim().replace(/^(\d{4})\/(\d{2}).*$/,'$1-$2');
    if(rowYm!==ym) return;
    var date=normalizeDate(row.date);
    if(!idx[row.name]) idx[row.name]={};
    idx[row.name][date]={status:row.status,start:row.start,end:row.end,note:row.note};
  });
  return idx;
}

function normalizeDate(raw){
  var s=String(raw).trim();
  if(/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  return s.replace(/\//g,'-').substring(0,10);
}

function statusChar(s){
  if(!s||s==='－'||s==='none') return {ch:'',cls:'b-none'};
  if(s.indexOf('○')>=0) return {ch:'○',cls:'b-ok'};
  if(s.indexOf('△')>=0) return {ch:'△',cls:'b-maybe'};
  if(s.indexOf('×')>=0) return {ch:'×',cls:'b-ng'};
  return {ch:'',cls:'b-none'};
}
function statusLg(s){
  if(!s||s==='－'||s==='none') return {ch:'',cls:'bl-none'};
  if(s.indexOf('○')>=0) return {ch:'○',cls:'bl-ok'};
  if(s.indexOf('△')>=0) return {ch:'△',cls:'bl-maybe'};
  if(s.indexOf('×')>=0) return {ch:'×',cls:'bl-ng'};
  return {ch:'',cls:'bl-none'};
}

/* ── 描画 ── */
function renderView(){
  var v=document.getElementById('main-view');
  if(currentMode==='kibou-all')    v.innerHTML=renderKibouAll();
  else if(currentMode==='kibou-single') v.innerHTML=renderKibouSingle();
  else                             v.innerHTML=renderKakuteiEdit();
}

/* ── 希望・全員表示 ── */
function renderKibouAll(){
  var idx=buildKibouIndex();
  var ym=currentYear+'-'+pad(currentMonth);
  var notes={};
  kibouData.forEach(function(r){ if(r.yearMonth===ym&&r.note) notes[r.name]=r.note; });
  var okN=0,mayN=0,ngN=0;
  STAFF.forEach(function(name){ Object.values(idx[name]||{}).forEach(function(v){ var sc=statusChar(v.status); if(sc.cls==='b-ok')okN++;if(sc.cls==='b-maybe')mayN++;if(sc.cls==='b-ng')ngN++; }); });
  var html='<div class="legend">';
  html+='<span><span class="leg-dot" style="background:var(--green-pale);color:var(--green)">○</span>出勤可</span>';
  html+='<span><span class="leg-dot" style="background:var(--amber-pale);color:var(--amber)">△</span>応相談</span>';
  html+='<span><span class="leg-dot" style="background:var(--red-pale);color:var(--red)">×</span>不可</span>';
  html+='</div>';
  html+=buildCalAll(idx,false);
  html+='<div class="summary-area"><div class="summary-title">月間サマリー</div><div class="summary-grid">';
  html+='<div class="summary-card s-ok"><div class="summary-num">'+okN+'</div><div class="summary-lbl">○ 出勤可</div></div>';
  html+='<div class="summary-card s-maybe"><div class="summary-num">'+mayN+'</div><div class="summary-lbl">△ 応相談</div></div>';
  html+='<div class="summary-card s-ng"><div class="summary-num">'+ngN+'</div><div class="summary-lbl">× 不可</div></div>';
  html+='</div></div>';
  var noteKeys=Object.keys(notes);
  if(noteKeys.length){ html+='<div class="notes-area"><div class="notes-title">備考</div>'; noteKeys.forEach(function(n){ html+='<div class="note-row"><span class="note-name">'+n+'</span>'+notes[n]+'</div>'; }); html+='</div>'; }
  return html;
}

/* ── 希望・個人表示 ── */
function renderKibouSingle(){
  var idx=buildKibouIndex();
  var html='<div class="staff-tabs">';
  STAFF.forEach(function(name){ html+='<button class="staff-tab'+(selectedStaff===name?' active':'')+'" onclick="selectStaff(\''+name+'\')">'+name+'</button>'; });
  html+='</div>';
  html+=buildCalSingle(idx[selectedStaff]||{});
  var d=idx[selectedStaff]||{};
  var okN=0,mayN=0,ngN=0;
  Object.values(d).forEach(function(v){ var sc=statusChar(v.status); if(sc.cls==='b-ok')okN++;if(sc.cls==='b-maybe')mayN++;if(sc.cls==='b-ng')ngN++; });
  html+='<div class="summary-area"><div class="summary-title">月間サマリー（'+selectedStaff+'）</div><div class="summary-grid">';
  html+='<div class="summary-card s-ok"><div class="summary-num">'+okN+'</div><div class="summary-lbl">○ 出勤可</div></div>';
  html+='<div class="summary-card s-maybe"><div class="summary-num">'+mayN+'</div><div class="summary-lbl">△ 応相談</div></div>';
  html+='<div class="summary-card s-ng"><div class="summary-num">'+ngN+'</div><div class="summary-lbl">× 不可</div></div>';
  html+='</div></div>';
  return html;
}

function selectStaff(name){ selectedStaff=name; renderView(); }

/* ── 確定シフト入力表示 ── */
function renderKakuteiEdit(){
  var idx=buildKibouIndex();
  var html='<div class="legend"><span>日付をタップして出勤スタッフを設定</span></div>';
  html+=buildCalKakutei(idx);
  return html;
}

/* ── カレンダー共通 ── */
function calHeader(){
  var html='<div class="cal-wrap"><div class="dow-row">';
  ['日','月','火','水','木','金','土'].forEach(function(d,i){ html+='<div class="dow-cell'+(i===0?' dow-sun':i===6?' dow-sat':'')+'">'+d+'</div>'; });
  html+='</div><div class="cal-grid">';
  return html;
}
function calFooter(){ return '</div></div>'; }
function calCellClass(d, firstDay){
  var dow=(firstDay+d-1)%7;
  var today=new Date();
  var isToday=today.getFullYear()===currentYear&&today.getMonth()===currentMonth-1&&today.getDate()===d;
  return 'day-cell'+(dow===0?' col-sun':dow===6?' col-sat':'')+(isToday?' day-today':'');
}

function buildCalAll(kibouIdx, isKakutei){
  var firstDay=new Date(currentYear,currentMonth-1,1).getDay();
  var lastDate=new Date(currentYear,currentMonth,0).getDate();
  var html=calHeader();
  for(var i=0;i<firstDay;i++) html+='<div class="day-cell empty"></div>';
  for(var d=1;d<=lastDate;d++){
    var ds=currentYear+'-'+pad(currentMonth)+'-'+pad(d);
    html+='<div class="'+calCellClass(d,firstDay)+'">';
    html+='<div class="day-num">'+d+'</div>';
    html+='<div class="staff-badges">';
    STAFF.forEach(function(name){
      var v=(kibouIdx[name]||{})[ds];
      var sc=statusChar(v?v.status:'');
      if(sc.cls==='b-none') return;
      html+='<div class="staff-row"><span class="staff-name-mini">'+name[0]+'</span><span class="badge-mini '+sc.cls+'">'+sc.ch+'</span></div>';
    });
    html+='</div></div>';
  }
  html+=calFooter();
  return html;
}

function buildCalSingle(data){
  var firstDay=new Date(currentYear,currentMonth-1,1).getDay();
  var lastDate=new Date(currentYear,currentMonth,0).getDate();
  var html=calHeader();
  for(var i=0;i<firstDay;i++) html+='<div class="day-cell empty"></div>';
  for(var d=1;d<=lastDate;d++){
    var ds=currentYear+'-'+pad(currentMonth)+'-'+pad(d);
    html+='<div class="'+calCellClass(d,firstDay)+'">';
    html+='<div class="day-num">'+d+'</div>';
    var v=data[ds];
    var sl=statusLg(v?v.status:'');
    if(sl.cls!=='bl-none') html+='<div class="badge-lg '+sl.cls+'">'+sl.ch+'</div>';
    html+='</div>';
  }
  html+=calFooter();
  return html;
}

function buildCalKakutei(kibouIdx){
  var firstDay=new Date(currentYear,currentMonth-1,1).getDay();
  var lastDate=new Date(currentYear,currentMonth,0).getDate();
  var html='<div class="cal-wrap"><div class="dow-row">';
  ['日','月','火','水','木','金','土'].forEach(function(d,i){ html+='<div class="dow-cell'+(i===0?' dow-sun':i===6?' dow-sat':'')+'">'+d+'</div>'; });
  html+='</div><div class="cal-grid">';
  for(var i=0;i<firstDay;i++) html+='<div class="day-cell empty"></div>';
  for(var d=1;d<=lastDate;d++){
    var ds=currentYear+'-'+pad(currentMonth)+'-'+pad(d);
    var dow=(firstDay+d-1)%7;
    var today=new Date();
    var isToday=today.getFullYear()===currentYear&&today.getMonth()===currentMonth-1&&today.getDate()===d;
    var cls='day-cell'+(dow===0?' col-sun':dow===6?' col-sat':'')+(isToday?' day-today':'');
    var conf=kakuteiEdit[ds];
    html+='<div class="'+cls+'" onclick="openKakuteiModal(\''+ds+'\')">';
    html+='<div class="day-num">'+d+'</div>';
    if(conf&&conf.staffList&&conf.staffList.length>0){
      html+='<div class="conf-staff-badges">';
      conf.staffList.forEach(function(name){ html+='<div class="conf-staff-row"><span class="conf-dot"></span><span class="conf-name">'+name[0]+'</span></div>'; });
      html+='</div>';
      if(conf.start&&conf.end) html+='<div style="font-size:8px;color:var(--muted);text-align:center;line-height:1.2">'+conf.start+'<br>'+conf.end+'</div>';
    } else {
      html+='<div class="confirmed-badge cb-empty">+</div>';
    }
    html+='</div>';
  }
  html+=calFooter();
  return html;
}

/* ── 確定シフト入力モーダル ── */
function openKakuteiModal(date){
  if(currentMode!=='kakutei') return;
  editingDate=date;
  var p=date.split('-');
  var dow=DOWS[new Date(+p[0],+p[1]-1,+p[2]).getDay()];
  document.getElementById('kk-date-label').textContent=+p[1]+'月'+p[2]+'日（'+dow+'）';

  var conf=kakuteiEdit[date]||{staffList:[],start:'',end:''};
  document.getElementById('kk-start').value=conf.start||'';
  document.getElementById('kk-end').value=conf.end||'';
  clearKkPresets();

  // スタッフボタン生成（希望ステータスも表示）
  var kibouIdx=buildKibouIndex();
  var grid=document.getElementById('kk-staff-grid');
  grid.innerHTML='';
  STAFF.forEach(function(name){
    var btn=document.createElement('button');
    btn.className='staff-check-btn'+(conf.staffList.indexOf(name)>=0?' selected':'');
    var kibou=(kibouIdx[name]||{})[date];
    var hint=kibou?statusChar(kibou.status).ch:'';
    btn.innerHTML=name+(hint?'<div class="staff-hint">'+hint+'</div>':'');
    btn.onclick=function(){btn.classList.toggle('selected');};
    grid.appendChild(btn);
  });

  document.getElementById('modal-kakutei').classList.add('open');
}

function closeKakuteiOutside(e){ if(e.target.id==='modal-kakutei') document.getElementById('modal-kakutei').classList.remove('open'); }

function saveKakuteiDay(){
  var selected=[];
  document.querySelectorAll('#kk-staff-grid .staff-check-btn.selected').forEach(function(btn){
    selected.push(btn.textContent.replace(/[○△×]/g,'').trim());
  });
  var start=document.getElementById('kk-start').value;
  var end=document.getElementById('kk-end').value;
  if(selected.length>0){
    kakuteiEdit[editingDate]={staffList:selected,start:start,end:end};
  } else {
    delete kakuteiEdit[editingDate];
  }
  kakuteiDirty=true;
  document.getElementById('modal-kakutei').classList.remove('open');
  renderView();
}

function clearKakuteiDay(){
  delete kakuteiEdit[editingDate];
  kakuteiDirty=true;
  document.getElementById('modal-kakutei').classList.remove('open');
  renderView();
}

function setKkPreset(btn,s,e){
  clearKkPresets(); btn.classList.add('active');
  document.getElementById('kk-start').value=s;
  document.getElementById('kk-end').value=e;
}
function clearKkPresets(){ document.querySelectorAll('.preset-btn').forEach(function(b){b.classList.remove('active');}); }

/* ── 確定シフト保存 ── */
function saveAllKakutei(){
  if(!kakuteiDirty && !confirm('変更がありませんが保存しますか？')) return;
  var ym=currentYear+'-'+pad(currentMonth);
  var shifts=[];
  Object.keys(kakuteiEdit).forEach(function(date){
    var conf=kakuteiEdit[date];
    conf.staffList.forEach(function(name){
      shifts.push({date:date,name:name,start:conf.start||'',end:conf.end||'',memo:''});
    });
  });
  fetch(GAS_URL,{
    method:'POST', mode:'no-cors',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({type:'kakutei',yearMonth:ym,shifts:shifts})
  }).then(function(){
    kakuteiDirty=false;
    alert('保存しました');
  }).catch(function(){ alert('保存に失敗しました'); });
}

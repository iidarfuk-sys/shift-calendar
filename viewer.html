<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>シフト管理ビューア</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0ede6;
  --card: #faf8f4;
  --green: #2c5f3f;
  --green2: #3d7a55;
  --green-pale: #ddeee3;
  --amber: #d4820a;
  --amber-pale: #fdf0d8;
  --red: #c0392b;
  --red-pale: #fdecea;
  --text: #1e2d24;
  --muted: #7a8f80;
  --border: #ddd8ce;
  --r: 12px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Noto Sans JP',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

/* ヘッダー */
.header {
  background:var(--green); color:#fff;
  padding:16px; position:sticky; top:0; z-index:20;
}
.header-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.header-title { font-size:16px; font-weight:700; letter-spacing:.05em; }
.month-nav { display:flex; align-items:center; gap:10px; }
.month-btn { background:rgba(255,255,255,.2); border:none; color:#fff; width:34px; height:34px; border-radius:8px; font-size:18px; cursor:pointer; }
.month-label { font-size:18px; font-weight:700; min-width:110px; text-align:center; }
.reload-btn { background:rgba(255,255,255,.2); border:none; color:#fff; padding:6px 12px; border-radius:8px; font-size:12px; font-family:'Noto Sans JP',sans-serif; cursor:pointer; }

/* モード切替 */
.mode-bar { display:flex; gap:0; background:rgba(255,255,255,.15); border-radius:8px; overflow:hidden; }
.mode-btn { flex:1; padding:7px; border:none; background:transparent; color:rgba(255,255,255,.7); font-size:12px; font-family:'Noto Sans JP',sans-serif; font-weight:500; cursor:pointer; transition:all .15s; }
.mode-btn.active { background:rgba(255,255,255,.3); color:#fff; font-weight:700; }

/* ローディング */
.loading { text-align:center; padding:60px 20px; color:var(--muted); font-size:14px; }
.spinner { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--green); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 12px; }
@keyframes spin { to { transform:rotate(360deg); } }

/* エラー */
.error-msg { text-align:center; padding:40px 20px; color:var(--red); font-size:14px; }

/* ── 全員表示モード ── */
.all-view { padding:12px; }

/* 凡例 */
.legend { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; padding:10px 0 6px; font-size:12px; color:var(--muted); }
.legend span { display:flex; align-items:center; gap:4px; }
.leg-dot { width:16px; height:16px; border-radius:4px; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; }

/* スタッフタブ */
.staff-tabs { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px; }
.staff-tab { padding:6px 12px; border:1.5px solid var(--border); border-radius:20px; font-size:12px; font-weight:500; background:var(--card); color:var(--muted); cursor:pointer; font-family:'Noto Sans JP',sans-serif; }
.staff-tab.active { background:var(--green); border-color:var(--green); color:#fff; }

/* カレンダー共通 */
.cal-wrap { background:var(--card); border-radius:var(--r); overflow:hidden; border:1px solid var(--border); }
.dow-row { display:grid; grid-template-columns:repeat(7,1fr); background:var(--green); }
.dow-cell { text-align:center; padding:7px 0; font-size:11px; font-weight:700; color:rgba(255,255,255,.85); }
.dow-sun { color:#ffb3b3; }
.dow-sat { color:#b3d4ff; }
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:1px; background:var(--border); }
.day-cell { background:var(--card); min-height:60px; padding:4px 2px 3px; display:flex; flex-direction:column; align-items:center; gap:2px; }
.day-cell.empty { background:var(--bg); }
.day-num { font-size:12px; font-weight:600; width:20px; height:20px; display:flex; align-items:center; justify-content:center; }
.col-sun .day-num { color:var(--red); }
.col-sat .day-num { color:#1a5276; }
.day-today .day-num { background:var(--amber); color:#fff; border-radius:50%; }

/* 全員モード: 各セルにスタッフ記号を縦並び */
.staff-badges { display:flex; flex-direction:column; gap:1px; width:100%; }
.staff-row { display:flex; align-items:center; gap:2px; padding:0 2px; }
.staff-name-mini { font-size:7px; color:var(--muted); width:18px; flex-shrink:0; overflow:hidden; white-space:nowrap; }
.badge-mini { font-size:10px; font-weight:700; width:16px; text-align:center; }
.b-ok    { color:var(--green); }
.b-maybe { color:var(--amber); }
.b-ng    { color:var(--red); }
.b-none  { color:#ccc; }

/* 個人モード: 大きい記号 */
.badge-lg { width:32px; height:26px; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:15px; font-weight:700; }
.bl-ok    { background:var(--green-pale); color:var(--green); }
.bl-maybe { background:var(--amber-pale); color:var(--amber); }
.bl-ng    { background:var(--red-pale);   color:var(--red); }
.bl-none  { border:1.5px dashed #ddd; }

/* 個人モードのスタッフ選択 */
.single-view { padding:12px; }
.single-staff-tabs { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px; }
.s-tab { padding:8px 16px; border:1.5px solid var(--border); border-radius:20px; font-size:13px; font-weight:500; background:var(--card); color:var(--muted); cursor:pointer; font-family:'Noto Sans JP',sans-serif; }
.s-tab.active { background:var(--green); border-color:var(--green); color:#fff; }

/* 備考エリア */
.notes-area { margin-top:12px; background:var(--card); border-radius:var(--r); padding:14px; border:1px solid var(--border); }
.notes-title { font-size:11px; font-weight:700; letter-spacing:.1em; color:var(--muted); margin-bottom:8px; }
.note-row { font-size:13px; color:var(--text); padding:6px 0; border-bottom:1px solid var(--border); line-height:1.6; }
.note-row:last-child { border-bottom:none; }
.note-name { font-weight:700; color:var(--green); margin-right:8px; }

/* サマリー */
.summary-area { margin-top:12px; background:var(--card); border-radius:var(--r); padding:14px; border:1px solid var(--border); }
.summary-title { font-size:11px; font-weight:700; letter-spacing:.1em; color:var(--muted); margin-bottom:10px; }
.summary-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
.summary-card { background:var(--bg); border-radius:8px; padding:10px; text-align:center; }
.summary-num { font-size:22px; font-weight:700; line-height:1; }
.summary-lbl { font-size:10px; color:var(--muted); margin-top:3px; }
.s-ok .summary-num { color:var(--green); }
.s-maybe .summary-num { color:var(--amber); }
.s-ng .summary-num { color:var(--red); }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="header-title">📋 シフト管理</div>
    <button class="reload-btn" onclick="loadData()">再読込</button>
  </div>
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
    <div class="month-nav">
      <button class="month-btn" onclick="changeMonth(-1)">‹</button>
      <div class="month-label" id="month-label"></div>
      <button class="month-btn" onclick="changeMonth(1)">›</button>
    </div>
  </div>
  <div class="mode-bar">
    <button class="mode-btn active" id="btn-all"    onclick="setMode('all')">全員表示</button>
    <button class="mode-btn"        id="btn-single" onclick="setMode('single')">個人表示</button>
  </div>
</div>

<div id="loading" class="loading"><div class="spinner"></div>データを読み込み中...</div>
<div id="error"   class="error-msg" style="display:none"></div>
<div id="view-all"    style="display:none"></div>
<div id="view-single" style="display:none"></div>

<script>
var GAS_URL   = 'https://script.google.com/macros/s/AKfycbzl1qFI1sruGRg1kUm-ZuM4InTZobs8Xo6AkmZO0EP8jzPw0tfNbFtFvL205dJNCWYi-w/exec';
var STAFF     = ['野口','吉田','磯村','音光寺','原'];
var DOWS      = ['日','月','火','水','木','金','土'];
var currentMode = 'all';
var selectedStaff = STAFF[0];
var rawData   = [];
var currentYear, currentMonth;

// 初期化
(function(){
  var now = new Date();
  if(now.getMonth()===11){ currentYear=now.getFullYear()+1; currentMonth=1; }
  else{ currentYear=now.getFullYear(); currentMonth=now.getMonth()+2; }
  updateMonthLabel();
  loadData();
})();

function pad(n){ return String(n).padStart(2,'0'); }
function updateMonthLabel(){ document.getElementById('month-label').textContent = currentYear+'年'+currentMonth+'月'; }

function changeMonth(d){
  currentMonth+=d;
  if(currentMonth>12){ currentMonth=1; currentYear++; }
  if(currentMonth<1) { currentMonth=12; currentYear--; }
  updateMonthLabel();
  renderView();
}

function setMode(mode){
  currentMode=mode;
  document.getElementById('btn-all').classList.toggle('active', mode==='all');
  document.getElementById('btn-single').classList.toggle('active', mode==='single');
  renderView();
}

function loadData(){
  document.getElementById('loading').style.display='block';
  document.getElementById('error').style.display='none';
  document.getElementById('view-all').style.display='none';
  document.getElementById('view-single').style.display='none';

  var url = GAS_URL + '?yearMonth=' + currentYear + '-' + pad(currentMonth);
  // JSONPで取得（CORSを回避）
  var script = document.createElement('script');
  window._gasCallback = function(data){
    document.getElementById('loading').style.display='none';
    if(data.result==='success'){ rawData=data.data; renderView(); }
    else{ showError('データ取得エラー: '+(data.message||'')); }
    document.head.removeChild(script);
  };
  // fetchで取得
  fetch(url)
    .then(function(r){ return r.json(); })
    .then(function(data){
      document.getElementById('loading').style.display='none';
      if(data.result==='success'){ rawData=data.data; renderView(); }
      else{ showError('データ取得エラー: '+(data.message||'')); }
    })
    .catch(function(err){
      document.getElementById('loading').style.display='none';
      showError('通信エラー。GASのデプロイ設定を確認してください。');
    });
}

function showError(msg){
  var el=document.getElementById('error');
  el.textContent=msg; el.style.display='block';
}

// データをname×dateでインデックス化
function buildIndex(){
  var idx={};
  var ym=currentYear+'-'+pad(currentMonth);
  rawData.forEach(function(row){
    // yearMonthの比較（2026-05形式に正規化して比較）
    var rowYm = String(row.yearMonth).trim().replace(/^(\d{4})\/(\d{2}).*$/,'$1-$2');
    if(rowYm !== ym) return;
    // dateを YYYY-MM-DD 形式に正規化
    var rawDate = String(row.date).trim();
    var dateKey;
    if(/^\d{4}-\d{2}-\d{2}$/.test(rawDate)){
      dateKey = rawDate;
    } else if(/^\d{4}\/\d{2}\/\d{2}$/.test(rawDate)){
      dateKey = rawDate.replace(/\//g,'-');
    } else {
      dateKey = rawDate;
    }
    if(!idx[row.name]) idx[row.name]={};
    idx[row.name][dateKey]={status:row.status, start:row.start, end:row.end, note:row.note};
  });
  return idx;
}

function statusChar(s){
  if(!s||s==='－'||s==='none') return {ch:'－',cls:'b-none'};
  if(s.indexOf('○')>=0) return {ch:'○',cls:'b-ok'};
  if(s.indexOf('△')>=0) return {ch:'△',cls:'b-maybe'};
  if(s.indexOf('×')>=0) return {ch:'×',cls:'b-ng'};
  return {ch:'－',cls:'b-none'};
}
function statusLg(s){
  if(!s||s==='－'||s==='none') return {ch:'',cls:'bl-none'};
  if(s.indexOf('○')>=0) return {ch:'○',cls:'bl-ok'};
  if(s.indexOf('△')>=0) return {ch:'△',cls:'bl-maybe'};
  if(s.indexOf('×')>=0) return {ch:'×',cls:'bl-ng'};
  return {ch:'',cls:'bl-none'};
}

function renderView(){
  if(currentMode==='all') renderAll();
  else renderSingle();
}

// ── 全員表示 ──
function renderAll(){
  document.getElementById('view-single').style.display='none';
  var el=document.getElementById('view-all');
  el.style.display='block';
  var idx=buildIndex();
  var ym=currentYear+'-'+pad(currentMonth);

  // 備考収集
  var notes={};
  rawData.forEach(function(row){
    if(row.yearMonth===ym && row.note) notes[row.name]=row.note;
  });

  // カウント
  var okCnt=0,mayCnt=0,ngCnt=0;
  STAFF.forEach(function(name){
    var d=idx[name]||{};
    Object.values(d).forEach(function(v){
      var sc=statusChar(v.status);
      if(sc.cls==='b-ok') okCnt++;
      if(sc.cls==='b-maybe') mayCnt++;
      if(sc.cls==='b-ng') ngCnt++;
    });
  });

  var html='<div class="all-view">';
  html+='<div class="legend">';
  html+='<span><span class="leg-dot" style="background:var(--green-pale);color:var(--green)">○</span>出勤可</span>';
  html+='<span><span class="leg-dot" style="background:var(--amber-pale);color:var(--amber)">△</span>応相談</span>';
  html+='<span><span class="leg-dot" style="background:var(--red-pale);color:var(--red)">×</span>出勤不可</span>';
  html+='</div>';

  html+=buildCalendarAll(idx);

  // サマリー
  html+='<div class="summary-area"><div class="summary-title">月間サマリー（全スタッフ）</div><div class="summary-grid">';
  html+='<div class="summary-card s-ok"><div class="summary-num">'+okCnt+'</div><div class="summary-lbl">○ 出勤可</div></div>';
  html+='<div class="summary-card s-maybe"><div class="summary-num">'+mayCnt+'</div><div class="summary-lbl">△ 応相談</div></div>';
  html+='<div class="summary-card s-ng"><div class="summary-num">'+ngCnt+'</div><div class="summary-lbl">× 出勤不可</div></div>';
  html+='</div></div>';

  // 備考
  var noteKeys=Object.keys(notes);
  if(noteKeys.length>0){
    html+='<div class="notes-area"><div class="notes-title">備考</div>';
    noteKeys.forEach(function(name){ html+='<div class="note-row"><span class="note-name">'+name+'</span>'+notes[name]+'</div>'; });
    html+='</div>';
  }
  html+='</div>';
  el.innerHTML=html;
}

function buildCalendarAll(idx){
  var firstDay=new Date(currentYear,currentMonth-1,1).getDay();
  var lastDate=new Date(currentYear,currentMonth,0).getDate();
  var today=new Date();
  var html='<div class="cal-wrap"><div class="dow-row">';
  ['日','月','火','水','木','金','土'].forEach(function(d,i){
    html+='<div class="dow-cell'+(i===0?' dow-sun':i===6?' dow-sat':'')+'">'+d+'</div>';
  });
  html+='</div><div class="cal-grid">';
  for(var i=0;i<firstDay;i++) html+='<div class="day-cell empty"></div>';
  for(var d=1;d<=lastDate;d++){
    var ds=currentYear+'-'+pad(currentMonth)+'-'+pad(d);
    var dow=(firstDay+d-1)%7;
    var isToday=today.getFullYear()===currentYear&&today.getMonth()===currentMonth-1&&today.getDate()===d;
    var cls='day-cell'+(dow===0?' col-sun':dow===6?' col-sat':'')+(isToday?' day-today':'');
    html+='<div class="'+cls+'">';
    html+='<div class="day-num">'+d+'</div>';
    html+='<div class="staff-badges">';
    STAFF.forEach(function(name){
      var v=(idx[name]||{})[ds];
      var sc=statusChar(v?v.status:'');
      html+='<div class="staff-row"><span class="staff-name-mini">'+name[0]+'</span><span class="badge-mini '+sc.cls+'">'+sc.ch+'</span></div>';
    });
    html+='</div></div>';
  }
  html+='</div></div>';
  return html;
}

// ── 個人表示 ──
function renderSingle(){
  document.getElementById('view-all').style.display='none';
  var el=document.getElementById('view-single');
  el.style.display='block';
  var idx=buildIndex();
  var ym=currentYear+'-'+pad(currentMonth);

  // タブ
  var html='<div class="single-view"><div class="single-staff-tabs">';
  STAFF.forEach(function(name){
    var act=name===selectedStaff?' active':'';
    html+='<button class="s-tab'+act+'" onclick="selectStaff(\''+name+'\')">'+name+'</button>';
  });
  html+='</div>';

  // カレンダー
  html+=buildCalendarSingle(idx[selectedStaff]||{});

  // 備考
  var note='';
  rawData.forEach(function(row){ if(row.yearMonth===ym&&row.name===selectedStaff&&row.note) note=row.note; });
  if(note){ html+='<div class="notes-area"><div class="notes-title">備考</div><div class="note-row">'+note+'</div></div>'; }

  // サマリー
  var d=idx[selectedStaff]||{};
  var okN=0,mayN=0,ngN=0;
  Object.values(d).forEach(function(v){ var sc=statusChar(v.status); if(sc.cls==='b-ok')okN++;if(sc.cls==='b-maybe')mayN++;if(sc.cls==='b-ng')ngN++; });
  html+='<div class="summary-area"><div class="summary-title">月間サマリー（'+selectedStaff+'）</div><div class="summary-grid">';
  html+='<div class="summary-card s-ok"><div class="summary-num">'+okN+'</div><div class="summary-lbl">○ 出勤可</div></div>';
  html+='<div class="summary-card s-maybe"><div class="summary-num">'+mayN+'</div><div class="summary-lbl">△ 応相談</div></div>';
  html+='<div class="summary-card s-ng"><div class="summary-num">'+ngN+'</div><div class="summary-lbl">× 出勤不可</div></div>';
  html+='</div></div>';

  html+='</div>';
  el.innerHTML=html;
}

function buildCalendarSingle(data){
  var firstDay=new Date(currentYear,currentMonth-1,1).getDay();
  var lastDate=new Date(currentYear,currentMonth,0).getDate();
  var today=new Date();
  var html='<div class="cal-wrap"><div class="dow-row">';
  ['日','月','火','水','木','金','土'].forEach(function(d,i){
    html+='<div class="dow-cell'+(i===0?' dow-sun':i===6?' dow-sat':'')+'">'+d+'</div>';
  });
  html+='</div><div class="cal-grid">';
  for(var i=0;i<firstDay;i++) html+='<div class="day-cell empty"></div>';
  for(var d=1;d<=lastDate;d++){
    var ds=currentYear+'-'+pad(currentMonth)+'-'+pad(d);
    var dow=(firstDay+d-1)%7;
    var isToday=today.getFullYear()===currentYear&&today.getMonth()===currentMonth-1&&today.getDate()===d;
    var cls='day-cell'+(dow===0?' col-sun':dow===6?' col-sat':'')+(isToday?' day-today':'');
    html+='<div class="'+cls+'">';
    html+='<div class="day-num">'+d+'</div>';
    var v=data[ds];
    var sl=statusLg(v?v.status:'');
    html+='<div class="badge-lg '+sl.cls+'">'+sl.ch+'</div>';
    html+='</div>';
  }
  html+='</div></div>';
  return html;
}

function selectStaff(name){
  selectedStaff=name;
  renderSingle();
}
</script>
</body>
</html>
